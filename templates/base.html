<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <div class="logo">GOV-SMART</div>
        <div class="title">Smart Queue Management System</div>
        <div class="nav-links">
            {% if session.user_id %}
                <span>Welcome, {{ session.name }}</span>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/">Sign In</a>
                <a href="/signup">Sign Up</a>
            {% endif %}
        </div>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
